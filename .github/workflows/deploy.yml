name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'config.js'
      - 'scripts/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build tools
        run: npm install -g sass esbuild

      - name: Build
        run: node scripts/build.js
        env:
          CI: true

      - name: Commit dist to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet && echo "No changes to commit" || \
            (git commit -m "chore: auto-build dist [skip ci]" && git push)

      - name: Purge jsDelivr cache
        run: |
          curl -sf "https://purge.jsdelivr.net/gh/camel-jp/BaseHtmlEdit@main/dist/style.css"          && echo "✓ CSS purged"          || echo "⚠ CSS purge skipped"
          curl -sf "https://purge.jsdelivr.net/gh/camel-jp/BaseHtmlEdit@main/dist/script.js"         && echo "✓ JS purged"           || echo "⚠ JS purge skipped"
          curl -sf "https://purge.jsdelivr.net/gh/camel-jp/BaseHtmlEdit@main/dist/lp/element-cube.html" && echo "✓ LP HTML purged" || echo "⚠ LP HTML purge skipped"

      - name: Deploy dist/ to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
